pipeline:
  - step: CreateVEnv
    module: pypeline.steps.create_venv
    config:
      package_manager: uv>=0.6
      python_version: 3.13
  - step: GenerateEnvSetupScript
    module: pypeline.steps.env_setup_script
  - step: PreCommit
    run: pre-commit run --all-files
  - step: PyTest
    run: pytest
  - step: BuildDocs
    run: sphinx-build -E -a docs build/docs
  - step: BuildAbout
    run: python -c "import sys; sys.path.insert(0, 'src'); from jarvis.about import AboutWriter; from pathlib import Path; AboutWriter(Path('docs/about.md'), Path('docs/timeline.json'), Path('build/docs')).write()"
  - step: BuildLanding
    run: python -c "import sys; sys.path.insert(0, 'src'); from jarvis.landing import LandingWriter; from pathlib import Path; LandingWriter(Path('build/docs')).write()"
